<nav class="vertical-navbar" *ngIf="authService.isLoggedIn()">
  
  <!-- Brand / Logo -->
  <div class="nav-brand" (click)="goToProfile()">
    <span class="brand-name">Invest<strong>Platform</strong></span>
  </div>
  
  <!-- Navigation Links -->
  <div class="nav-links">
    <ng-container *ngFor="let link of navLinks">
      <a [routerLink]="link.route"
         routerLinkActive="active"
         class="nav-link">
        {{ link.label }}
      </a>
    </ng-container>
  </div>
  
  <!-- User Profile Section (en bas) -->
  <div class="nav-footer">
    <div class="profile-section" (click)="goToProfile()">
      <div class="avatar-container">
        <!-- Profile photo if available -->
        <img *ngIf="getProfilePhoto()" 
             [src]="getProfilePhoto()" 
             (error)="handleImageError($event)"
             alt="Profile photo" 
             class="avatar-image"
             crossorigin="anonymous">
        
        <!-- Fallback with initials -->
        <div class="avatar-fallback" 
             [class.hidden]="getProfilePhoto()">
          {{ userInitials }}
        </div>
      </div>
      <div class="user-info">
        <span class="user-name">{{ getDisplayName() }}</span>
        <span class="user-email">{{ currentUser?.email }}</span>
        <span class="user-role">{{ roleLabel }}</span>
      </div>
    </div>
    
    <button class="btn-logout" (click)="logout()">
      Logout
    </button>
  </div>

</nav>
